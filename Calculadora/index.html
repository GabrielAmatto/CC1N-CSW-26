<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadoras de Idade</title>

    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div id="container">

        <h1>
            Calculadora Simples
        </h1>

        <input 
            type="number"
            id="anoInput"
            placeholder="Digite o ano"
        >

        <button id="botaoAno">
            Calcular
        </button>

        <div id="resultadoAno">
            Resultado
        </div>

    </div>



    <div id="container2">

        <h1>
            Calculadora Completa
        </h1>

        <select id="dia"></select>

        <select id="mes"></select>

        <select id="ano"></select>

        <button id="botao">
            Calcular
        </button>

        <div id="resultado">
            Resultado
        </div>

    </div>

    <script src="index.js"></script>

</body>
</html>
